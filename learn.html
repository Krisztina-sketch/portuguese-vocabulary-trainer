<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Portuguese | Portuguese Vocabulary Trainer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            🇵🇹 Portuguese Vocabulary Trainer
        </a>

        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="index.html">
                Home
            </a>

            <a class="btn btn-light btn-sm me-2" href="learn.html">
                Learn
            </a>

            <a class="btn btn-outline-light btn-sm me-2" href="quiz.html">
                Quiz
            </a>

            <a class="btn btn-outline-light btn-sm me-2" href="progress.html">
                Progress
            </a>

            <a class="btn btn-outline-light btn-sm" href="about.html">
                About
            </a>
        </div>

    </div>
</nav>

<main class="container text-center mt-5">

    <h1>Learn Portuguese Vocabulary</h1>

    <p class="lead">
        Use the buttons to move through the vocabulary cards.
    </p>

    <div class="card mx-auto mt-4 shadow" style="max-width: 500px;">
        <div class="card-body p-5">

            <p class="text-muted">Portuguese</p>

            <h2 id="portuguese-word">
                Olá
            </h2>

            <hr>

            <p class="text-muted">English</p>

            <h3 id="english-word">
                Hello
            </h3>

            <hr>

            <p class="text-muted">Example sentence</p>

            <p id="example-sentence">
                Olá! Como está?
            </p>

        </div>
    </div>

    <div class="mt-4">

        <button id="previous-button" class="btn btn-secondary btn-lg m-2">
            Previous
        </button>

        <button id="next-button" class="btn btn-success btn-lg m-2">
            Next
        </button>

    </div>

    <p class="mt-3">
        Word <span id="current-number">1</span> of
        <span id="total-number">5</span>
    </p>

</main>

<script src="assets/js/learn.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
