
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            🇵🇹 Portuguese Vocabulary Trainer
        </a>

        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="index.html">Home</a>
            <a class="btn btn-outline-light btn-sm me-2" href="learn.html">Learn</a>

<header class="container text-center mt-5">

    <h1>Portuguese Vocabulary Quiz</h1>

    <p class="lead">
        Choose the correct English meaning.
    </p>

    <div class="card shadow mx-auto mt-4" style="max-width:600px;">

        <div class="card-body p-5">

            <p>
                Question
                <span id="question-number">1</span>
                of
                <span id="total-questions">5</span>
            </p>

            <h2 id="question-word"></h2>

            <div id="answer-options" class="d-grid gap-2 mt-4"></div>

            <p id="feedback" class="mt-4 fw-bold"></p>

            <button
                id="next-question-button"
                class="btn btn-success mt-3 d-none">
                Next Question
            </button>

        </div>

    </div>

</header>

<script src="assets/js/quiz.js"></script>
